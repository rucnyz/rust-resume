name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Build
        run: cargo build

      - name: Test
        run: cargo test

  # TODO: agent-smoke-test — run real agents (claude, gemini, codex, etc.)
  # to generate sessions, then verify fr-rs can discover and parse them.
  # Requires API keys in GitHub Secrets. See tests/adapters.rs for mock-based
  # adapter tests that run without secrets.
