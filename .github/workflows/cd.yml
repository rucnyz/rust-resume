name: CD

permissions:
  contents: write

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:

jobs:
  create-release:
    name: Create release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub release
        uses: ncipollo/release-action@v1
        with:
          prerelease: false
          generateReleaseNotes: true
          allowUpdates: true

  build-release:
    name: Build ${{ matrix.target }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            binary-postfix: ""
            use-cross: false
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            binary-postfix: ""
            use-cross: true
          - os: macos-latest
            target: x86_64-apple-darwin
            binary-postfix: ""
            use-cross: false
          - os: macos-latest
            target: aarch64-apple-darwin
            binary-postfix: ""
            use-cross: false
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary-postfix: ".exe"
            use-cross: false
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Install cross
        if: matrix.use-cross
        run: cargo install cross

      - name: Build
        shell: bash
        run: |
          if [ "${{ matrix.use-cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Strip binary
        if: runner.os != 'Windows'
        run: |
          BIN=target/${{ matrix.target }}/release/fr-rs${{ matrix.binary-postfix }}
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            sudo apt-get install -y binutils-aarch64-linux-gnu
            aarch64-linux-gnu-strip "$BIN"
          elif [ "${{ runner.os }}" != "macOS" ]; then
            strip "$BIN"
          fi

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          BIN=target/${{ matrix.target }}/release/fr-rs${{ matrix.binary-postfix }}
          RELEASE_NAME=fr-rs-${GITHUB_REF/refs\/tags\//}-${{ matrix.target }}
          mkdir -p "$RELEASE_NAME"
          cp "$BIN" "$RELEASE_NAME/"
          tar czvf "$RELEASE_NAME.tar.gz" "$RELEASE_NAME"
          shasum -a 256 "$RELEASE_NAME.tar.gz" > "$RELEASE_NAME.tar.gz.sha256"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $BIN = "target/${{ matrix.target }}/release/fr-rs${{ matrix.binary-postfix }}"
          $TAG = $env:GITHUB_REF -replace 'refs/tags/',''
          $RELEASE_NAME = "fr-rs-$TAG-${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path $RELEASE_NAME
          Copy-Item $BIN "$RELEASE_NAME/"
          Compress-Archive -Path "$RELEASE_NAME/*" -DestinationPath "$RELEASE_NAME.zip"
          $hash = (Get-FileHash "$RELEASE_NAME.zip" -Algorithm SHA256).Hash.ToLower()
          "$hash  $RELEASE_NAME.zip" | Out-File -Encoding ascii "$RELEASE_NAME.zip.sha256"

      - name: Upload release assets
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          omitBody: true
          omitName: true
          artifacts: |
            fr-rs-*.tar.gz
            fr-rs-*.tar.gz.sha256
            fr-rs-*.zip
            fr-rs-*.zip.sha256
